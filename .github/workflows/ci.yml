name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dev tooling
        run: npm ci

      - name: Lint & format (Biome)
        run: npx biome ci .

      - name: Type-check (tsc --checkJs, strict)
        run: npm run typecheck

      - name: Unit tests (node:test)
        run: npm test
